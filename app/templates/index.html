<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F5-TTS Аудиокниги</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2em;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card h2 {
            margin-bottom: 20px;
            color: #00d9ff;
            font-size: 1.2em;
        }
        
        .drop-zone {
            border: 2px dashed #444;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #00d9ff;
            background: rgba(0,217,255,0.1);
        }
        
        .drop-zone input {
            display: none;
        }
        
        .btn {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.02);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #333;
            color: #fff;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            color: #aaa;
        }
        
        input[type="text"], 
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #00d9ff;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .checkbox-group input {
            width: auto;
        }
        
        .book-info {
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .book-info h3 {
            color: #00ff88;
            margin-bottom: 8px;
        }
        
        .book-info p {
            color: #ccc;
            margin: 4px 0;
        }
        
        .chapters-list {
            max-height: 200px;
            overflow-y: auto;
            background: #222;
            border-radius: 8px;
            padding: 8px;
            margin-top: 8px;
        }
        
        .chapter-item {
            padding: 8px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .chapter-item:last-child {
            border-bottom: none;
        }
        
        .progress-container {
            margin-top: 20px;
        }
        
        .progress-bar {
            height: 24px;
            background: #222;
            border-radius: 12px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #000;
        }
        
        .progress-text {
            text-align: center;
            color: #aaa;
            font-size: 14px;
        }
        
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-pending { background: #666; }
        .status-processing { background: #ff9800; }
        .status-completed { background: #4caf50; }
        .status-failed { background: #f44336; }
        
        .download-btn {
            display: inline-block;
            background: #4caf50;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 16px;
            font-weight: 600;
        }
        
        .download-btn:hover {
            background: #45a049;
        }
        
        .error {
            background: rgba(244,67,54,0.2);
            border: 1px solid #f44336;
            border-radius: 8px;
            padding: 12px;
            color: #f44336;
            margin-top: 12px;
        }
        
        .history {
            margin-top: 20px;
        }
        
        .history-item {
            background: #222;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .hidden {
            display: none;
        }
        
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎧 F5-TTS Аудиокниги</h1>
        <p class="subtitle">Конвертация FB2 в аудиокнигу</p>
        
        <!-- Загрузка файла -->
        <div class="card">
            <h2>📚 Загрузка книги</h2>
            <div class="drop-zone" id="dropZone">
                <p>Перетащите файл FB2 сюда или нажмите для выбора</p>
                <input type="file" id="fileInput" accept=".fb2">
            </div>
            <div class="actions">
                <button class="btn" id="uploadBtn" disabled>Загрузить</button>
            </div>
            <div id="uploadError" class="error hidden"></div>
        </div>
        
        <!-- Информация о книге -->
        <div class="card hidden" id="bookCard">
            <h2>📖 Информация о книге</h2>
            <div id="bookInfo"></div>
            
            <div class="form-group" style="margin-top: 20px;">
                <label>Настройки конвертации</label>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div>
                        <label>Формат</label>
                        <select id="outFormat">
                            <option value="mp3">MP3</option>
                            <option value="wav">WAV</option>
                        </select>
                    </div>
                    <div>
                        <label>Скорость</label>
                        <input type="number" id="voiceSpeed" value="1.0" min="0.5" max="2.0" step="0.1">
                    </div>
                    <div>
                        <label>Тембр</label>
                        <input type="number" id="voicePitch" value="0.0" min="-12.0" max="12.0" step="1.0">
                    </div>
                    <div>
                        <label>Громкость</label>
                        <input type="number" id="voiceVolume" value="1.0" min="0.1" max="2.0" step="0.1">
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 12px;">
                    <label>Выбор глав (через запятую, например: 1,2,5)</label>
                    <input type="text" id="chaptersInput" placeholder="оставить пустым для всех глав">
                </div>
                
                <div class="checkbox-group" style="margin-top: 12px;">
                    <input type="checkbox" id="mergeChapters" checked>
                    <label for="mergeChapters" style="margin: 0;">Объединить главы в один файл</label>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="addMarkers" checked>
                    <label for="addMarkers" style="margin: 0;">Добавить маркеры глав</label>
                </div>
                
                <div class="form-group" style="margin-top: 12px;">
                    <label>Webhook URL (опционально)</label>
                    <input type="text" id="notifyUrl" placeholder="https://...">
                </div>
            </div>
            
            <div class="actions">
                <button class="btn" id="convertBtn">🎬 Начать конвертацию</button>
                <button class="btn btn-secondary" id="newBookBtn">Загрузить другую книгу</button>
            </div>
        </div>
        
        <!-- Прогресс -->
        <div class="card hidden" id="progressCard">
            <h2>⚡ Конвертация</h2>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
                </div>
                <p class="progress-text" id="progressText">Ожидание...</p>
                <p style="text-align: center; margin-top: 8px;">
                    <span class="status status-pending" id="taskStatus">PENDING</span>
                </p>
            </div>
            <div id="downloadSection" class="hidden">
                <a class="download-btn" id="downloadLink" href="#">⬇ Скачать аудиокнигу</a>
            </div>
            <div id="conversionError" class="error hidden"></div>
        </div>
        
        <!-- История -->
        <div class="card">
            <h2>📋 История задач</h2>
            <div id="historyList"></div>
            <button class="btn btn-secondary" id="refreshHistory" style="margin-top: 12px;">Обновить</button>
        </div>
    </div>

    <script>
        const API = '';
        let currentBookId = null;
        let currentTaskId = null;
        let selectedFile = null;
        let ws = null;

        // Drag and drop
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFileSelect(e.target.files[0]);
            }
        });
        
        function handleFileSelect(file) {
            if (!file.name.toLowerCase().endsWith('.fb2')) {
                showError('uploadError', 'Пожалуйста, выберите файл FB2');
                return;
            }
            selectedFile = file;
            document.getElementById('uploadBtn').disabled = false;
            dropZone.innerHTML = `<p>📄 ${file.name}</p>`;
            hideError('uploadError');
        }
        
        // Upload
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            if (!selectedFile) return;
            
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.textContent = 'Загрузка...';
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            try {
                const resp = await fetch(`${API}/api/v1/books/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || 'Ошибка загрузки');
                }
                
                const book = await resp.json();
                currentBookId = book.id;
                showBookInfo(book);
                document.getElementById('bookCard').classList.remove('hidden');
                dropZone.innerHTML = '<p>Перетащите файл FB2 сюда или нажмите для выбора</p>';
                
            } catch (e) {
                showError('uploadError', e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Загрузить';
            }
        });
        
        function showBookInfo(book) {
            const info = document.getElementById('bookInfo');
            const chapters = book.chapters.map(ch => `
                <div class="chapter-item">
                    <span>Глава ${ch.number}: ${ch.title}</span>
                    <span style="color: #888;">(${ch.text_length} симв.)</span>
                </div>
            `).join('');
            
            info.innerHTML = `
                <div class="book-info">
                    <h3>${book.title}</h3>
                    <p>Автор: ${book.author}</p>
                    <p>Глав: ${book.chapters.length}</p>
                    <p>Примерная длительность: ~${Math.round(book.estimated_duration_minutes)} мин</p>
                </div>
                <div class="chapters-list">${chapters}</div>
            `;
        }
        
        // Convert
        document.getElementById('convertBtn').addEventListener('click', async () => {
            const btn = document.getElementById('convertBtn');
            btn.disabled = true;
            btn.textContent = 'Запуск...';
            
            const params = {
                out_format: document.getElementById('outFormat').value,
                voice_speed: parseFloat(document.getElementById('voiceSpeed').value),
                voice_pitch: parseFloat(document.getElementById('voicePitch').value),
                voice_volume: parseFloat(document.getElementById('voiceVolume').value),
                merge_chapters: document.getElementById('mergeChapters').checked,
                add_chapter_markers: document.getElementById('addMarkers').checked,
                notify_url: document.getElementById('notifyUrl').value || null
            };
            
            const chaptersInput = document.getElementById('chaptersInput').value.trim();
            if (chaptersInput) {
                params.chapters = chaptersInput.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
            }
            
            try {
                const resp = await fetch(`${API}/api/v1/books/${currentBookId}/convert`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(params)
                });
                
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || 'Ошибка запуска');
                }
                
                const task = await resp.json();
                currentTaskId = task.task_id;
                
                document.getElementById('progressCard').classList.remove('hidden');
                document.getElementById('downloadSection').classList.add('hidden');
                hideError('conversionError');
                
                startProgressPolling();
                
            } catch (e) {
                showError('conversionError', e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🎬 Начать конвертацию';
            }
        });
        
        // Progress polling
        let pollInterval = null;

        function startProgressPolling() {
            if (ws) ws.close();
            if (pollInterval) clearInterval(pollInterval);

            // WebSocket
            try {
                ws = new WebSocket(`ws://${window.location.host}/api/v1/ws/progress/${currentTaskId}`);

                ws.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    updateProgress(data);
                };

                ws.onerror = (err) => {
                    console.log('WebSocket error, using polling:', err);
                };

                ws.onclose = () => {
                    console.log('WebSocket closed');
                };
            } catch (e) {
                console.log('WebSocket failed, using polling:', e);
            }

            // Always start polling as backup (every 3 seconds)
            pollProgress();
            pollInterval = setInterval(pollProgress, 3000);
        }

        function stopProgressPolling() {
            if (ws) ws.close();
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }

        function pollProgress() {
            if (!currentTaskId) return;

            fetch(`${API}/api/v1/tasks/${currentTaskId}`)
                .then(r => r.json())
                .then(updateProgress)
                .catch(console.error);
        }
        
        function updateProgress(task) {
            const fill = document.getElementById('progressFill');
            const text = document.getElementById('progressText');
            const status = document.getElementById('taskStatus');
            
            const percent = Math.round(task.progress_percent || 0);
            fill.style.width = `${percent}%`;
            fill.textContent = `${percent}%`;
            
            let statusText = task.message || 'Обработка...';
            if (task.current_chapter && task.total_chapters) {
                statusText = `Глава ${task.current_chapter}/${task.total_chapters}`;
                if (task.current_chunk && task.total_chunks) {
                    statusText += ` • Чанк ${task.current_chunk}/${task.total_chunks}`;
                }
            }
            text.textContent = statusText;
            
            status.textContent = task.status;
            status.className = `status status-${task.status}`;
            
            if (task.status === 'completed') {
                document.getElementById('downloadSection').classList.remove('hidden');
                document.getElementById('downloadLink').href = `${API}/api/v1/download/${currentTaskId}`;
                stopProgressPolling();
            } else if (task.status === 'failed') {
                showError('conversionError', task.error || 'Ошибка конвертации');
                stopProgressPolling();
            }
        }
        
        // New book
        document.getElementById('newBookBtn').addEventListener('click', () => {
            currentBookId = null;
            currentTaskId = null;
            selectedFile = null;
            document.getElementById('bookCard').classList.add('hidden');
            document.getElementById('progressCard').classList.add('hidden');
            document.getElementById('fileInput').value = '';
            document.getElementById('uploadBtn').disabled = true;
        });
        
        // History
        document.getElementById('refreshHistory').addEventListener('click', loadHistory);
        
        function loadHistory() {
            fetch(`${API}/api/v1/tasks`)
                .then(r => r.json())
                .then(tasks => {
                    const list = document.getElementById('historyList');
                    if (!tasks.length) {
                        list.innerHTML = '<p style="color: #888;">Нет задач</p>';
                        return;
                    }
                    
                    list.innerHTML = tasks.slice(0, 10).map(t => `
                        <div class="history-item">
                            <div>
                                <strong>${t.book_title || 'Книга'}</strong>
                                <br><small style="color: #888;">${t.message || ''}</small>
                            </div>
                            <span class="status status-${t.status}">${t.status}</span>
                        </div>
                    `).join('');
                })
                .catch(console.error);
        }
        
        // Helpers
        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.classList.remove('hidden');
        }
        
        function hideError(id) {
            document.getElementById(id).classList.add('hidden');
        }
        
        // Init
        loadHistory();
        setInterval(loadHistory, 30000);
    </script>
</body>
</html>
